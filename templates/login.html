<!--
  ============================================================
   login.html  -  Pantalla de inicio de sesion (req. web #1)
  ------------------------------------------------------------
   Pagina independiente (no usa la barra del panel porque aun
   no hay sesion). Muestra el formulario de correo + contrasena.
  ============================================================
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlertaU - Iniciar sesion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background-color:#0d3b66;">

  <div class="card shadow" style="width: 100%; max-width: 380px;">
    <div class="card-body p-4">

      <!-- Encabezado -->
      <div class="text-center mb-4">
        <i class="bi bi-shield-exclamation" style="font-size:2.5rem; color:#0d3b66;"></i>
        <h4 class="mt-2 mb-0 fw-bold">AlertaU</h4>
        <small class="text-muted">Panel del personal autorizado</small>
      </div>

      <!-- Mensajes flash (errores de login, etc.) -->
      {% with mensajes = get_flashed_messages(with_categories=true) %}
        {% if mensajes %}
          {% for categoria, texto in mensajes %}
            <div class="alert alert-{{ categoria }} py-2">{{ texto }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Formulario de login: envia por POST a /login -->
      <form method="POST" action="{{ url_for('ws_auth.login') }}">
        <div class="mb-3">
          <label class="form-label">Correo institucional</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="correo" class="form-control" placeholder="admin@usat.edu.pe" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Contrasena</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="********" required>
          </div>
        </div>
        <button type="submit" class="btn w-100 text-white" style="background-color:#0d3b66;">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>

      <!-- Ayuda con los usuarios de prueba -->
      <div class="text-center mt-3">
        <small class="text-muted">Prueba: admin@usat.edu.pe / usat</small>
      </div>
    </div>
  </div>

</body>
</html>
